pipeline_step:
  id: "smart-router-ps"
  user_id: "<YOUR_USER_ID>"
  app_id: "<YOUR_APP_ID>"

build_info:
  python_version: "3.11"
  platform: "linux/amd64"

pipeline_step_compute_info:
  cpu_limit: "2000m"
  cpu_memory: "2Gi"
  num_accelerators: 0

pipeline_step_input_params:
  # ── Router ──
  - name: user_prompt
    description: "Natural-language prompt describing what the user wants (used for intent classification)"
  - name: model_url
    description: "Clarifai model URL — used as LLM for code review, VLM for chart analysis, and for Tier 2 intent classification"
  # ── Code Review ──
  - name: repo_url
    description: "Git repository URL to clone and review (→ code_review skill)"
  - name: branch
    description: "Git branch to checkout (default: main)"
  - name: file_patterns
    description: "Comma-separated glob patterns for Python files (default: **/*.py)"
  - name: code_text
    description: "Raw Python code to review (→ code_review skill)"
  - name: review_strictness
    description: "Strictness level: low, medium, high (→ code_review skill)"
  # ── Chart Analysis ──
  - name: image_url
    description: "URL of chart/graph image (→ chart_analysis skill)"
  - name: image_base64
    description: "Base64-encoded chart image (→ chart_analysis skill)"
  - name: image_path
    description: "Local file path to chart image (→ chart_analysis skill)"
  - name: analysis_type
    description: "Chart analysis type: general, data_extraction, trend_analysis, comparison, anomaly_detection"
  - name: output_format
    description: "Output format: summary, detailed, json_table, markdown"
  - name: additional_context
    description: "Extra context about the chart (domain, metrics, units)"
  # ── Snap-Eval ──
  - name: csv_path
    description: "Local path to eval results CSV (→ snap_eval skill)"
  - name: csv_url
    description: "URL to download eval results CSV (→ snap_eval skill)"
  - name: csv_text
    description: "Raw CSV string of eval results (→ snap_eval skill)"
  - name: failure_threshold
    description: "Absolute-error threshold in seconds for pass/fail classification (default: 0.5)"
  - name: top_n_worst
    description: "Number of worst predictions to include in the report (default: 20)"
  # ── Shared ──
  - name: inference_params
    description: "JSON string with model inference params: {temperature, max_tokens}"
  - name: user_id
    description: "Clarifai user ID"
  - name: app_id
    description: "Clarifai app ID"
  - name: save_results
    description: "Whether to persist results to Clarifai (default: false)"
