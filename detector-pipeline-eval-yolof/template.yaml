name: detector-pipeline-eval-yolof
description: YOLOF-based object detector evaluation pipeline
pipeline_template_type: EVALUATION
parameters:
- name: user_id
  type: STRING
  required: true
  description: Clarifai user
  constraints:
    string_constraints:
      allow_free_text: false
  ui_hints:
    widget: DROPDOWN
    data_source: clarifai.users.list
- name: app_id
  type: STRING
  required: true
  description: Clarifai application
  constraints:
    string_constraints:
      allow_free_text: false
  ui_hints:
    widget: DROPDOWN
    data_source: clarifai.apps.list
- name: dataset_source
  type: STRING
  required: true
  default_string: artifact
  description: Dataset source - "artifact" for pre-packaged dataset or "clarifai" for Clarifai dataset export
  constraints:
    string_constraints:
      allowed_values:
      - artifact
      - clarifai
      allow_free_text: false
  ui_hints:
    widget: DROPDOWN
- name: dataset_id
  type: STRING
  required: false
  default_string: ''
  description: Clarifai dataset ID (required when dataset_source=clarifai)
  constraints:
    string_constraints:
      allow_free_text: false
  ui_hints:
    widget: DROPDOWN
    data_source: clarifai.datasets.list
- name: dataset_version_id
  type: STRING
  required: false
  default_string: ''
  description: Clarifai dataset version ID (required when dataset_source=clarifai)
  ui_hints:
    widget: TEXT_INPUT
- name: concepts
  type: STRING
  required: true
  default_string: '["bird","cat"]'
  description: JSON list of concepts to evaluate
  ui_hints:
    widget: TEXT_INPUT
- name: image_size
  type: STRING
  required: true
  default_string: '[512]'
  description: Input image size specification
  ui_hints:
    widget: TEXT_INPUT
- name: max_aspect_ratio
  type: FLOAT
  required: true
  default_float: 1.5
  description: Maximum aspect ratio when preserving aspect
  constraints:
    float_constraints:
      min: 1.0
      max: 5.0
  ui_hints:
    widget: SLIDER
- name: keep_aspect_ratio
  type: BOOL
  required: true
  default_bool: true
  description: Whether to preserve original image aspect ratio
  ui_hints:
    widget: TOGGLE
    serialize_as_string: true
- name: batch_size
  type: INT
  required: true
  default_int: 8
  description: Inference batch size for evaluation
  constraints:
    int_constraints:
      min: 1
      max: 64
  ui_hints:
    widget: SLIDER
- name: score_threshold
  type: FLOAT
  required: true
  default_float: 0.05
  description: Minimum confidence score for detections
  constraints:
    float_constraints:
      min: 0.0
      max: 1.0
  ui_hints:
    widget: SLIDER
- name: iou_threshold
  type: FLOAT
  required: true
  default_float: 0.6
  description: IoU threshold for NMS
  constraints:
    float_constraints:
      min: 0.1
      max: 1.0
  ui_hints:
    widget: SLIDER
- name: pretrained_weights
  type: STRING
  required: true
  default_string: coco
  description: Pretrained weights source
  constraints:
    string_constraints:
      allowed_values:
      - coco
      allow_free_text: false
  ui_hints:
    widget: DROPDOWN
