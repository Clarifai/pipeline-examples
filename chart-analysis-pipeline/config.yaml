pipeline:
  id: "<YOUR_PIPELINE_ID>"
  user_id: "<YOUR_USER_ID>"
  app_id: "<YOUR_APP_ID>"
  step_directories:
    - chart-analysis-ps
  orchestration_spec:
    argo_orchestration_spec: |
      apiVersion: argoproj.io/v1alpha1
      kind: Workflow
      metadata:
        generateName: chart-analysis-pipeline
      spec:
        entrypoint: sequence
        arguments:
          parameters:
            - name: image_url
              value: ""
            - name: image_base64
              value: ""
            - name: image_path
              value: ""
            - name: analysis_type
              value: "general"
            - name: output_format
              value: "detailed"
            - name: vlm_model_url
              value: ""
            - name: vlm_inference_params
              value: '{"temperature": 0.2, "max_tokens": 4096}'
            - name: additional_context
              value: ""
            - name: user_id
              value: "<YOUR_USER_ID>"
            - name: app_id
              value: "<YOUR_APP_ID>"
            - name: save_results
              value: "false"
        templates:
        - name: sequence
          steps:
          - - name: chart-analysis
              templateRef:
                name: users/<YOUR_USER_ID>/apps/<YOUR_APP_ID>/pipeline_steps/chart-analysis-ps
                template: users/<YOUR_USER_ID>/apps/<YOUR_APP_ID>/pipeline_steps/chart-analysis-ps
              arguments:
                parameters:
                  - name: image_url
                    value: "{{workflow.parameters.image_url}}"
                  - name: image_base64
                    value: "{{workflow.parameters.image_base64}}"
                  - name: image_path
                    value: "{{workflow.parameters.image_path}}"
                  - name: analysis_type
                    value: "{{workflow.parameters.analysis_type}}"
                  - name: output_format
                    value: "{{workflow.parameters.output_format}}"
                  - name: vlm_model_url
                    value: "{{workflow.parameters.vlm_model_url}}"
                  - name: vlm_inference_params
                    value: "{{workflow.parameters.vlm_inference_params}}"
                  - name: additional_context
                    value: "{{workflow.parameters.additional_context}}"
                  - name: user_id
                    value: "{{workflow.parameters.user_id}}"
                  - name: app_id
                    value: "{{workflow.parameters.app_id}}"
                  - name: save_results
                    value: "{{workflow.parameters.save_results}}"
