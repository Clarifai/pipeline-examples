pipeline:
  id: "<YOUR_PIPELINE_ID>"
  user_id: "<YOUR_USER_ID>"
  app_id: "<YOUR_APP_ID>"
  orchestration_spec:
    argo_orchestration_spec: |
      apiVersion: argoproj.io/v1alpha1
      kind: Workflow
      metadata:
        generateName: resnet-autoloop-
      spec:
        entrypoint: autoloop
        arguments:
          parameters:
            # ── Existing ResNet training parameters ──
            - name: user_id
              value: "<YOUR_USER_ID>"
            - name: app_id
              value: "<YOUR_APP_ID>"
            - name: model_id
              value: "test_model"
            - name: dataset_id
              value: "<YOUR_DATASET_ID>"
            - name: dataset_version_id
              value: ""
            - name: concepts
              value: '["beignets","hamburger","prime_rib","ramen"]'
            - name: num_epochs
              value: "200"
            - name: batch_size
              value: "64"
            - name: image_size
              value: "224"
            - name: per_item_lrate
              value: "0.00001953125"
            - name: weight_decay
              value: "0.01"
            - name: per_item_min_lrate
              value: "1.5625e-8"
            - name: warmup_iters
              value: "5"
            - name: warmup_ratio
              value: "0.0001"
            - name: flip_probability
              value: "0.5"
            - name: flip_direction
              value: "horizontal"
            - name: concepts_mutually_exclusive
              value: "false"
            - name: pretrained_weights
              value: "ImageNet-1k"
            - name: seed
              value: "-1"
            # ── Autoloop-specific parameters ──
            - name: task_type
              value: "classification"
            - name: metric_threshold
              value: "0.85"
            - name: primary_metric
              value: "auto"
            - name: metric_direction
              value: "auto"
            - name: max_retrain_iterations
              value: "3"
            - name: tuning_strategy
              value: "schedule"
            - name: search_space
              value: "auto"
            - name: lr_decay_factor
              value: "0.5"
            - name: unfreeze_on_retry
              value: "false"
            - name: early_stop_min_delta
              value: "0.0"
            - name: overfitting_detection
              value: "false"
            # ── LLM decision parameters ──
            - name: llm_model_url
              value: ""
            - name: task_description
              value: "Image classification model (ResNet) training with top-k accuracy metrics."
            - name: llm_temperature
              value: "0.1"
            - name: llm_max_retries
              value: "3"
            # ── Loop state parameters ──
            - name: current_iteration
              value: "1"
            - name: current_hyperparams
              value: "{}"
            - name: hp_history
              value: "[]"

        templates:
          # ── Main DAG ──────────────────────────────────────────────
          - name: autoloop
            inputs:
              parameters:
                - name: current_iteration
                - name: current_hyperparams
                - name: hp_history
            dag:
              tasks:
                # ── STEP 1: Train (ResNet classifier) ──
                - name: train
                  templateRef:
                    name: users/<YOUR_USER_ID>/apps/<YOUR_APP_ID>/pipeline_steps/classifier-pipeline-resnet-ps/versions/<TRAIN_PS_VERSION>
                    template: users/<YOUR_USER_ID>/apps/<YOUR_APP_ID>/pipeline_steps/classifier-pipeline-resnet-ps/versions/<TRAIN_PS_VERSION>
                  arguments:
                    parameters:
                      - name: user_id
                        value: "{{workflow.parameters.user_id}}"
                      - name: app_id
                        value: "{{workflow.parameters.app_id}}"
                      - name: model_id
                        value: "{{workflow.parameters.model_id}}"
                      - name: dataset_id
                        value: "{{workflow.parameters.dataset_id}}"
                      - name: dataset_version_id
                        value: "{{workflow.parameters.dataset_version_id}}"
                      - name: concepts
                        value: "{{workflow.parameters.concepts}}"
                      - name: num_epochs
                        value: "{{workflow.parameters.num_epochs}}"
                      - name: batch_size
                        value: "{{workflow.parameters.batch_size}}"
                      - name: image_size
                        value: "{{workflow.parameters.image_size}}"
                      - name: per_item_lrate
                        value: "{{workflow.parameters.per_item_lrate}}"
                      - name: weight_decay
                        value: "{{workflow.parameters.weight_decay}}"
                      - name: per_item_min_lrate
                        value: "{{workflow.parameters.per_item_min_lrate}}"
                      - name: warmup_iters
                        value: "{{workflow.parameters.warmup_iters}}"
                      - name: warmup_ratio
                        value: "{{workflow.parameters.warmup_ratio}}"
                      - name: flip_probability
                        value: "{{workflow.parameters.flip_probability}}"
                      - name: flip_direction
                        value: "{{workflow.parameters.flip_direction}}"
                      - name: concepts_mutually_exclusive
                        value: "{{workflow.parameters.concepts_mutually_exclusive}}"
                      - name: pretrained_weights
                        value: "{{workflow.parameters.pretrained_weights}}"
                      - name: seed
                        value: "{{workflow.parameters.seed}}"
                      - name: skip_export
                        value: "true"

                # ── STEP 2: Evaluate (metrics extracted by train step) ──
                # When skip_export=True, the train step extracts eval metrics
                # from the MMPretrain JSON log and writes them as an Argo output
                # parameter. No separate eval pod is needed.
                - name: eval
                  depends: "train.Succeeded"
                  template: passthrough-eval
                  arguments:
                    parameters:
                      - name: eval_results
                        value: "{{tasks.train.outputs.parameters.eval_results}}"

                # ── STEP 3: LLM Decision (replaces metric-decision + hp-adjust) ──
                - name: llm-decide
                  depends: "eval.Succeeded"
                  templateRef:
                    name: users/<YOUR_USER_ID>/apps/<YOUR_APP_ID>/pipeline_steps/llm-decision-ps/versions/<LLM_DECISION_PS_VERSION>
                    template: users/<YOUR_USER_ID>/apps/<YOUR_APP_ID>/pipeline_steps/llm-decision-ps/versions/<LLM_DECISION_PS_VERSION>
                  arguments:
                    parameters:
                      - name: eval_results_json
                        value: "{{tasks.eval.outputs.parameters.eval_results}}"
                      - name: task_type
                        value: "{{workflow.parameters.task_type}}"
                      - name: task_description
                        value: "{{workflow.parameters.task_description}}"
                      - name: primary_metric
                        value: "{{workflow.parameters.primary_metric}}"
                      - name: metric_direction
                        value: "{{workflow.parameters.metric_direction}}"
                      - name: metric_threshold
                        value: "{{workflow.parameters.metric_threshold}}"
                      - name: current_iteration
                        value: "{{inputs.parameters.current_iteration}}"
                      - name: max_retrain_iterations
                        value: "{{workflow.parameters.max_retrain_iterations}}"
                      - name: hp_history
                        value: "{{inputs.parameters.hp_history}}"
                      - name: current_hyperparams
                        value: "{{inputs.parameters.current_hyperparams}}"
                      - name: search_space
                        value: "{{workflow.parameters.search_space}}"
                      - name: tuning_strategy
                        value: "{{workflow.parameters.tuning_strategy}}"
                      - name: lr_decay_factor
                        value: "{{workflow.parameters.lr_decay_factor}}"
                      - name: unfreeze_on_retry
                        value: "{{workflow.parameters.unfreeze_on_retry}}"
                      - name: early_stop_min_delta
                        value: "{{workflow.parameters.early_stop_min_delta}}"
                      - name: overfitting_detection
                        value: "{{workflow.parameters.overfitting_detection}}"
                      - name: llm_model_url
                        value: "{{workflow.parameters.llm_model_url}}"
                      - name: llm_temperature
                        value: "{{workflow.parameters.llm_temperature}}"
                      - name: llm_max_retries
                        value: "{{workflow.parameters.llm_max_retries}}"
                      - name: seed
                        value: "{{workflow.parameters.seed}}"
                      - name: model_id
                        value: "{{workflow.parameters.model_id}}"
                      - name: user_id
                        value: "{{workflow.parameters.user_id}}"
                      - name: app_id
                        value: "{{workflow.parameters.app_id}}"

                # ── BRANCH: Deploy → Export ──
                - name: export
                  depends: "llm-decide.Succeeded"
                  when: "{{tasks.llm-decide.outputs.parameters.decision}} == deploy"
                  templateRef:
                    name: users/<YOUR_USER_ID>/apps/<YOUR_APP_ID>/pipeline_steps/model-export-ps/versions/<EXPORT_PS_VERSION>
                    template: users/<YOUR_USER_ID>/apps/<YOUR_APP_ID>/pipeline_steps/model-export-ps/versions/<EXPORT_PS_VERSION>
                  arguments:
                    parameters:
                      - name: user_id
                        value: "{{workflow.parameters.user_id}}"
                      - name: app_id
                        value: "{{workflow.parameters.app_id}}"
                      - name: model_id
                        value: "{{workflow.parameters.model_id}}"
                      - name: checkpoint_source
                        value: "model_artifact"
                      - name: artifact_id
                        value: "{{tasks.train.outputs.parameters.artifact_id}}"

                # ── STEP 4: Recursive Retrain ──
                - name: retrain
                  depends: "llm-decide.Succeeded"
                  when: "{{tasks.llm-decide.outputs.parameters.decision}} == retrain"
                  template: autoloop
                  arguments:
                    parameters:
                      - name: current_iteration
                        value: "{{tasks.llm-decide.outputs.parameters.next_iteration}}"
                      - name: current_hyperparams
                        value: "{{tasks.llm-decide.outputs.parameters.hyperparams_json}}"
                      - name: hp_history
                        value: "{{tasks.llm-decide.outputs.parameters.hp_history}}"

                # ── BRANCH: Stop → Report ──
                - name: report-failure
                  depends: "llm-decide.Succeeded"
                  when: "{{tasks.llm-decide.outputs.parameters.decision}} == stop"
                  template: failure-report
                  arguments:
                    parameters:
                      - name: final_metric
                        value: "{{tasks.llm-decide.outputs.parameters.metric_value}}"
                      - name: metric_name
                        value: "{{tasks.llm-decide.outputs.parameters.metric_name}}"
                      - name: iterations_run
                        value: "{{tasks.llm-decide.outputs.parameters.current_iteration}}"

          # ── Passthrough Eval Template ──────────────────────────────
          # The train step (with skip_export=True) extracts eval metrics
          # and writes them as an Argo output. This template passes them
          # through to downstream steps without needing cross-pod file access.
          - name: passthrough-eval
            inputs:
              parameters:
                - name: eval_results
            outputs:
              parameters:
                - name: eval_results
                  valueFrom:
                    path: /tmp/eval_results.json
            container:
              image: python:3.11-slim
              command: [python, -c]
              args:
                - |
                  import json
                  results = """{{inputs.parameters.eval_results}}"""
                  with open("/tmp/eval_results.json", "w") as f:
                      f.write(results)
                  parsed = json.loads(results)
                  print(f"Eval metrics: {json.dumps(parsed.get('metrics', {}), indent=2)}")

          # ── Failure Report Template ───────────────────────────────
          - name: failure-report
            inputs:
              parameters:
                - name: final_metric
                - name: metric_name
                - name: iterations_run
            container:
              image: python:3.11-slim
              command: [python, -c]
              args:
                - |
                  import json, sys
                  raw_metric = "{{inputs.parameters.final_metric}}"
                  try:
                      final_metric = float(raw_metric)
                  except (ValueError, TypeError):
                      final_metric = None
                  report = {
                    "status": "FAILED",
                    "reason": "Metric threshold not met after max iterations",
                    "metric_name": "{{inputs.parameters.metric_name}}",
                    "final_metric": final_metric,
                    "iterations_run": int("{{inputs.parameters.iterations_run}}"),
                  }
                  print(json.dumps(report, indent=2))
                  sys.exit(1)
