# D-FINE model config for Clarifai
# After fine-tuning, concepts will be updated with trained classes
model:
  id: dfine-detector
  user_id: placeholder_user
  app_id: placeholder_app
  model_type_id: visual-detector
build_info:
  python_version: '3.11'
inference_compute_info:
  cpu_limit: '4'
  cpu_memory: 8Gi
  num_accelerators: 1
  accelerator_type:
  - NVIDIA-*
  accelerator_memory: 10Gi
checkpoints:
  type: huggingface
  repo_id: ustc-community/dfine-small-obj2coco
  when: runtime
concepts:
- id: '0'
  name: placeholder
