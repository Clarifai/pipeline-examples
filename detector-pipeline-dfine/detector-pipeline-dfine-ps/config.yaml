pipeline_step:
  id: "detector-pipeline-dfine-ps"
  user_id: "clarifai"
  app_id: "train_pipelines"
  visibility:
    gettable: PUBLIC

build_info:
  python_version: "3.11"
  platform: "linux/amd64"

pipeline_step_compute_info:
  cpu_limit: "4000m"
  cpu_memory: "16Gi"
  num_accelerators: 1
  accelerator_memory: "16Gi"
  accelerator_type: ["NVIDIA-*"]

pipeline_step_input_params:
  - name: user_id
    description: "User ID"
  - name: app_id
    description: "App ID"
  - name: model_id
    description: "Model ID"
  - name: clarifai_dataset_id
    description: "Clarifai dataset ID (use 'None' for default artifact dataset)"
  - name: dataset_version_id
    description: "Dataset Version ID (empty for latest)"
  - name: concepts
    description: "List of class names as JSON array"
  - name: pretrained_model
    description: "HuggingFace model ID (default: ustc-community/dfine-small-obj2coco)"
  - name: num_epochs
    description: "Number of fine-tuning epochs (official custom config uses 220; 50 is quick-start)"
  - name: batch_size
    description: "Per-GPU batch size (official uses 64 total across 8 GPUs)"
  - name: learning_rate
    description: "Base learning rate (0.0004 from D-FINE-S custom config)"
  - name: weight_decay
    description: "Weight decay (0.0001 from D-FINE-S config)"
  - name: warmup_steps
    description: "Linear warmup steps (500 from D-FINE include/optimizer.yml)"
  - name: seed
    description: "Random seed (-1 for default 42)"
  - name: streaming_video
    description: "If the trained model should support streaming (default false)"
