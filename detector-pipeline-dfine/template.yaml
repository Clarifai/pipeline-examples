name: detector-pipeline-dfine
description: D-FINE transformer-based object detector fine-tuning pipeline
pipeline_template_type: TRAINING
parameters:
- name: user_id
  type: STRING
  required: true
  description: Clarifai user
  constraints:
    string_constraints:
      allow_free_text: false
  ui_hints:
    widget: DROPDOWN
    data_source: clarifai.users.list
- name: app_id
  type: STRING
  required: true
  description: Clarifai application
  constraints:
    string_constraints:
      allow_free_text: false
  ui_hints:
    widget: DROPDOWN
    data_source: clarifai.apps.list
- name: model_id
  type: STRING
  required: true
  default_string: dfine_detector
  description: Unique identifier for the detector model being trained
  ui_hints:
    widget: TEXT_INPUT
- name: clarifai_dataset_id
  type: STRING
  required: true
  default_string: None
  description: Clarifai dataset ID to train on, or "None" to use the default artifact dataset
  ui_hints:
    widget: TEXT_INPUT
- name: dataset_version_id
  type: STRING
  required: true
  default_string: ''
  description: Clarifai dataset version ID for the chosen dataset
  ui_hints:
    widget: TEXT_INPUT
- name: concepts
  type: STRING
  required: true
  default_string: '["bird","cat"]'
  description: JSON list of concept IDs to detect (used to filter dataset)
  ui_hints:
    widget: TEXT_INPUT
- name: pretrained_model
  type: STRING
  required: true
  default_string: ustc-community/dfine-small-obj2coco
  description: HuggingFace model ID to use as pretrained starting point
  constraints:
    string_constraints:
      allowed_values:
      - ustc-community/dfine-small-obj2coco
      allow_free_text: false
  ui_hints:
    widget: DROPDOWN
- name: num_epochs
  type: INT
  required: true
  default_int: 200
  description: Total training epochs
  constraints:
    int_constraints:
      min: 1
      max: 500
  ui_hints:
    widget: SLIDER
- name: batch_size
  type: INT
  required: true
  default_int: 8
  description: Training batch size
  constraints:
    int_constraints:
      min: 1
      max: 128
  ui_hints:
    widget: SLIDER
- name: learning_rate
  type: FLOAT
  required: true
  default_float: 0.0004
  description: Learning rate for optimizer
  constraints:
    float_constraints:
      min: 0.0
      max: 1.0
  ui_hints:
    widget: NUMBER_INPUT
- name: weight_decay
  type: FLOAT
  required: true
  default_float: 0.0001
  description: Weight decay for optimizer
  constraints:
    float_constraints:
      min: 0.0
      max: 1.0
  ui_hints:
    widget: NUMBER_INPUT
- name: warmup_steps
  type: INT
  required: true
  default_int: 500
  description: Number of linear warmup steps at the start of training
  constraints:
    int_constraints:
      min: 0
      max: 5000
  ui_hints:
    widget: NUMBER_INPUT
- name: seed
  type: INT
  required: true
  default_int: -1
  description: Random seed for reproducibility (-1 uses default 42)
  constraints:
    int_constraints:
      min: -1
      max: 999999
  ui_hints:
    widget: NUMBER_INPUT
