name: Check Requirements

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check-requirements:
    name: Validate requirements.txt files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Compile all requirements.txt files
        run: |
          failed=0
          while IFS= read -r req_file; do
            echo "::group::Compiling $req_file"
            if uv pip compile "$req_file" -o /dev/null; then
              echo "✅ $req_file resolved successfully"
            else
              echo "::error file=$req_file::Failed to resolve dependencies in $req_file"
              failed=1
            fi
            echo "::endgroup::"
          done < <(find . -name requirements.txt -type f | sort)

          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more requirements.txt files failed to resolve"
            exit 1
          fi
